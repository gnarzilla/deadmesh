# node-baseline.yaml
# deadmesh test rig baseline config
# Apply with: meshtastic --port <PORT> --configure node-baseline.yaml
# Per-device fields (owner long/short name) are set separately — see provision.sh

config:
  device:
    role: CLIENT                    # bench testing — no aggressive rebroadcast
    rebroadcast_mode: ALL
    node_info_broadcast_secs: 900   # 15 min during testing (default is 3h)
    button_gpio: 0
    buzzer_gpio: 0
    double_tap_as_button_press: false
    led_heartbeat_disabled: false
    serial_enabled: false           # this is the *console* serial, not the API

  position:
    position_broadcast_secs: 1800       # 30 min during testing
    position_broadcast_smart_enabled: true
    gps_update_interval: 86400
    broadcast_smart_minimum_distance: 100
    broadcast_smart_minimum_interval_secs: 30
    gps_mode: NOT_PRESENT               # Heltec V3 has no GPS; Wio overrides below
    fixed_position: false

  power:
    wait_bluetooth_secs: 1
    sds_secs: 86400
    ls_secs: 86400
    min_wake_secs: 10
    is_power_saving: false              # keep radios responsive during testing

  network:
    wifi_enabled: false
    eth_enabled: false
    ntp_server: meshtastic.pool.ntp.org

  display:
    screen_on_secs: 1
    gps_format: UNUSED
    units: METRIC
    oled: OLED_AUTO
    displaymode: DEFAULT

  lora:
    use_preset: true
    modem_preset: MEDIUM_FAST           # intentional — reduces public mesh noise
    region: US
    hop_limit: 3
    tx_enabled: true
    tx_power: 30                        # check FCC Part 15 for your antenna
    sx126x_rx_boosted_gain: true
    override_duty_cycle: false
    ignore_mqtt: true                   # do not relay public MQTT-bridged traffic
    config_ok_to_mqtt: false            # do not opt into public MQTT reporting

  bluetooth:
    enabled: true
    mode: RANDOM_PIN

module_config:
  mqtt:
    enabled: false                      # critical — no public MQTT bridge
    proxy_to_client_enabled: false
    map_reporting_enabled: false

  serial:
    enabled: true                       # this is the API serial deadmesh uses
    baud: BAUD_115200
    mode: DEFAULT
    echo: false

  store_forward:
    enabled: false                      # let deadmesh handle DTN, not firmware

  range_test:
    enabled: false

  telemetry:
    device_update_interval: 1800        # 30 min — useful for dashboard testing
    environment_measurement_enabled: false
    power_measurement_enabled: false
    health_measurement_enabled: false

  neighbor_info:
    enabled: false                      # nice for topology but extra airtime

  detection_sensor:
    enabled: false

  paxcounter:
    enabled: false

  external_notification:
    enabled: false

  canned_message:
    enabled: false                      # was true on .003; off for cleaner logs

  remote_hardware:
    enabled: false
